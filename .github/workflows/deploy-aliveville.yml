name: Deploy aliveville landing

on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-landing/package-lock.json
      - name: Install and build
        working-directory: astro-landing
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # the action auto-detects the repo's packageManager (pnpm) which isn't
          # installed in this npm-based job; pin to npm so wrangler installs cleanly
          packageManager: npm
          command: pages deploy astro-landing/dist --project-name=aliveville --branch=main
      - name: Smoke production
        run: curl --fail --silent --show-error --location https://aliveville.com/ --output /dev/null
