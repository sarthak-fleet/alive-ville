name: Deploy aliveville landing

# Rollback: Cloudflare Pages preserves every deployment. Roll back via
# dash.cloudflare.com → Pages → aliveville → Deployments → "Rollback to this
# deployment".
on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-landing/package-lock.json
      - name: Install and build
        working-directory: astro-landing
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # the action auto-detects the repo's packageManager (pnpm) which isn't
          # installed in this npm-based job; pin to npm so wrangler installs cleanly
          packageManager: npm
          command: pages deploy astro-landing/dist --project-name=aliveville --branch=main
      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://aliveville.com/
