name: Deploy aliveville landing

on:
  push:
    branches: [main]
    paths:
      - "astro-landing/**"
      - ".github/workflows/deploy-aliveville.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-landing/package-lock.json
      - name: Install and build
        working-directory: astro-landing
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro-landing/dist --project-name=aliveville --branch=main
      - name: Smoke production
        run: curl --fail --silent --show-error --location https://aliveville.com/ --output /dev/null
